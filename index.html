<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Entregas</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<header>
  🚚 Minhas Entregas
</header>

<div id="map"></div>

<button onclick="toggleEntregues()" style="margin:10px">
  👁️ Mostrar / Ocultar entregas concluídas
</button>

<button onclick="iniciarRota()" style="margin:10px;width:95%">
  🛣️ Iniciar rota do dia
</button>

<button onclick="abrirRelatorio()" style="margin:10px;width:95%">
  📊 Relatório do dia
</button>

<div id="relatorio" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharRelatorio()">✖</span>
    <h2>📊 Relatório do dia</h2>
    <div id="conteudoRelatorio"></div>
    <button onclick="resetarDia()">🔄 Resetar dia</button>
  </div>
</div>

<h3 style="padding:10px">📋 Entregas cadastradas</h3>

<ul id="lista"></ul>

<button class="fab" onclick="abrirModal()">＋</button>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="fecharModal()">✖</span>

    <h2>Nova Entrega</h2>
    <input id="nome" placeholder="Cliente">
    <input id="endereco" placeholder="Endereço">

    <button onclick="adicionarEntrega()">Salvar</button>
    <button class="cancel" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/storage.js"></script>
<script src="js/gps.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>
</body>
</html>
